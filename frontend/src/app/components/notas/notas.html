<div class="notas-container">
  <!-- Criar Nota -->
  <mat-card class="card-criar">
    <mat-card-header>
      <mat-card-title>Criar Nova Nota Fiscal</mat-card-title>
    </mat-card-header>
    <mat-card-content [formGroup]="form">
      <!-- Itens -->
      <div *ngIf="itens.length > 0" class="itens-list">
        <div *ngFor="let item of itens.controls; let i = index" class="item-row" [formGroup]="$any(item)">
          <mat-form-field class="item-produto">
            <mat-label>Produto</mat-label>
            <mat-select formControlName="produto_id">
              <mat-option *ngFor="let p of produtos" [value]="p.id">
                {{ p.codigo }} - {{ p.descricao }} ({{ p.saldo }})
              </mat-option>
            </mat-select>
          </mat-form-field>
          <mat-form-field class="item-qty">
            <mat-label>Qty</mat-label>
            <input matInput type="number" formControlName="quantidade" min="1" />
          </mat-form-field>
          <button mat-icon-button color="warn" (click)="removerItem(i)">
            <mat-icon>close</mat-icon>
          </button>
        </div>
      </div>
      <button mat-stroked-button (click)="adicionarItem()" class="btn-full">
        <mat-icon>add</mat-icon> Adicionar Produto
      </button>
    </mat-card-content>
    <mat-card-actions>
      <button mat-raised-button color="primary" (click)="salvar()" [disabled]="loading || form.invalid" class="btn-full">
        <mat-spinner *ngIf="loading" diameter="18"></mat-spinner>
        <span *ngIf="!loading">Criar Nota</span>
      </button>
    </mat-card-actions>
  </mat-card>

  <!-- Lista de Notas -->
  <mat-card class="card-lista">
    <mat-card-header>
      <mat-card-title>Notas Fiscais</mat-card-title>
    </mat-card-header>
    <mat-card-content>
      <mat-spinner *ngIf="loading" diameter="30"></mat-spinner>
      
      <div *ngIf="!loading && notas.length === 0" class="empty">
        <mat-icon>note_add</mat-icon>
        <p>Nenhuma nota fiscal</p>
      </div>

      <table mat-table [dataSource]="notas" class="notas-table" *ngIf="!loading && notas.length > 0">
        <ng-container matColumnDef="numero">
          <th mat-header-cell *matHeaderCellDef>#</th>
          <td mat-cell *matCellDef="let n"><strong>{{ n.numero }}</strong></td>
        </ng-container>
        <ng-container matColumnDef="status">
          <th mat-header-cell *matHeaderCellDef>Status</th>
          <td mat-cell *matCellDef="let n">
            <mat-chip [color]="n.status === 'Aberta' ? 'primary' : 'accent'" selected>
              {{ n.status }}
            </mat-chip>
          </td>
        </ng-container>
        <ng-container matColumnDef="acoes">
          <th mat-header-cell *matHeaderCellDef>Ação</th>
          <td mat-cell *matCellDef="let n">
            <button *ngIf="n.status === 'Aberta'" mat-mini-fab color="accent" (click)="imprimir(n.id)" [disabled]="imprimindo === n.id">
              <mat-spinner *ngIf="imprimindo === n.id" diameter="20"></mat-spinner>
              <mat-icon *ngIf="imprimindo !== n.id">print</mat-icon>
            </button>
            <span *ngIf="n.status === 'Fechada'" class="closed">✓ Fechada</span>
          </td>
        </ng-container>
        <tr mat-header-row *matHeaderRowDef="['numero', 'status', 'acoes']"></tr>
        <tr mat-row *matRowDef="let row; columns: ['numero', 'status', 'acoes']"></tr>
      </table>
    </mat-card-content>
  </mat-card>
</div>
